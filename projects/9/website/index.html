<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AWS Bedrock Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      height: 90vh;
    }

    .header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #1a1f2e;
      border: 1px solid #ff9900;
      color: #ff9900;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      margin-bottom: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    h1 { font-size: 1.5rem; font-weight: 700; }
    h1 span { color: #ff9900; }

    .messages {
      flex: 1;
      overflow-y: auto;
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .message {
      max-width: 80%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .message.user {
      background: #ff9900;
      color: #0f1117;
      align-self: flex-end;
      font-weight: 500;
    }

    .message.assistant {
      background: #2d3748;
      color: #e2e8f0;
      align-self: flex-start;
    }

    .message.loading {
      background: #2d3748;
      color: #718096;
      align-self: flex-start;
      font-style: italic;
    }

    .input-area {
      display: flex;
      gap: 0.5rem;
    }

    input {
      flex: 1;
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #ff9900; }

    button {
      background: #ff9900;
      color: #0f1117;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .footer {
      text-align: center;
      font-size: 0.7rem;
      color: #4a5568;
      margin-top: 0.75rem;
    }

    .footer span { color: #ff9900; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="badge">🤖 AWS AI Practitioner</div>
      <h1>Bedrock <span>Chatbot</span></h1>
    </div>

    <div class="messages" id="messages">
      <div class="message assistant">
        Hello! I'm powered by Amazon Bedrock. How can I help you today?
      </div>
    </div>

    <div class="input-area">
      <input
        type="text"
        id="input"
        placeholder="Type your message..."
        onkeydown="if(event.key==='Enter') sendMessage()"
      />
      <button id="btn" onclick="sendMessage()">Send</button>
    </div>

    <div class="footer">
      Powered by <span>Amazon Bedrock</span> · Claude · AWS AI Practitioner
    </div>
  </div>

  <script>
    // Replace with your API Gateway URL after deploying
    const API_URL = "https://xxxx.execute-api.us-east-1.amazonaws.com/prod/chat";

    async function sendMessage() {
      const input = document.getElementById("input");
      const btn   = document.getElementById("btn");
      const text  = input.value.trim();

      if (!text) return;

      addMessage(text, "user");
      input.value = "";
      btn.disabled = true;

      const loading = addMessage("Thinking...", "loading");

      try {
        const res  = await fetch(API_URL, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ message: text })
        });

        const data = await res.json();
        loading.remove();
        addMessage(data.reply || data.error, "assistant");
      } catch (e) {
        loading.remove();
        addMessage("Error connecting to the API.", "assistant");
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    function addMessage(text, type) {
      const messages = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = `message ${type}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }
  </script>
</body>
</html>
